; OPcache production tuning for the FrankenPHP web image.
;
; FrankenPHP here runs in CLASSIC mode (php_server) — PHP boots per request — so bytecode
; caching is the single biggest throughput lever. Laravel + Filament + vendor is ~20k PHP
; files; the DEFAULT opcache.max_accelerated_files (10000) can't hold them, so the cache
; thrashes and a large share of the codebase RECOMPILES on every request (the ~1.6s the
; admin panel was burning per page). validate_timestamps=0 is correct here: each deploy
; ships a fresh, immutable container, so there is no need to stat ~20k files per request.
opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=512
opcache.interned_strings_buffer=32
opcache.max_accelerated_files=30000
opcache.validate_timestamps=0
opcache.save_comments=1
opcache.jit=tracing
opcache.jit_buffer_size=128M
