# Web-service-ONLY Railway config (the per-service file railway.toml anticipates).
#
# Point the WEB service at this file: Railway → web service → Settings →
# "Config-as-code" / Config Path → set to `railway.web.toml`.
#
# WHY THIS EXISTS: railway.toml (shared by web/worker/scheduler) deliberately sets
# NO healthcheck, because a global /up check breaks the port-less worker+scheduler.
# The web service instead had a /up healthcheck configured in the dashboard with a
# ~30s window — and FrankPHP's cold boot (Laravel bootstrap + config/route/view
# cache warm on a ~20k-file app) can exceed 30s, so Railway marked the NEW container
# unhealthy and rolled back EVERY deploy ("predeploy: ok → Stopping Container →
# Deploy failed"). This re-gates web on /up but with a generous timeout so a slow
# cold boot is never a false-negative rollback.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
preDeployCommand = "sh scripts/predeploy.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/up"
# 300s: FrankPHP + Laravel/Filament cold boot must have plenty of headroom.
healthcheckTimeout = 300
