# LETS post-purchase interstitial (SECONDARY / enhancement path).
#
# A post-purchase checkout extension (type = "checkout_post_purchase"): a full
# interstitial page shown AFTER the order is confirmed but BEFORE the Order-status
# page. It can natively add a line item to the just-placed order via
# applyChangeset.
#
# IMPORTANT (Israeli reality): the native post-purchase CHANGESET payment path
# requires Shopify Payments / a supporting payment configuration. Israeli PayPlus
# merchants typically are NOT on Shopify Payments, so:
#   - PRIMARY path = the LETS token widget (extensions/lets-thank-you), which
#     charges the saved PayPlus token through the App Proxy. No changeset.
#   - SECONDARY path = THIS extension's native applyChangeset, enabled ONLY when
#     Phase-0.5 verification proves the target store's payment config supports it.
# So this extension defaults to the LETS token path and falls back to the native
# changeset only behind a verified capability flag (see src/index.jsx).
#
# The extension points (ShouldRender + Render) are declared in code via extend()
# from @shopify/post-purchase-ui-extensions; the toml just declares the extension.

name = "LETS post-purchase (native)"
type = "checkout_post_purchase"

# Up to five metafields can be exposed to the extension input. We read none by
# default; the offer is resolved server-side via the App Proxy.
# [[metafields]]
# namespace = "payplus_subscriptions"
# key = "upsell_offer"
