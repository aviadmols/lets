# Shopify app configuration — the LETS app (public, App-Store-distributed).
#
# Ships as "LETS" at https://app.lets.co.il (PayPlus Subscriptions, Installments
# & Post-Purchase Upsells for Israeli merchants).
#
# `shopify app config push` validates this; the mandatory privacy webhooks
# declared here are validated at config-push time, AND we register them via the
# Admin API on install (belt-and-suspenders). The scopes here MUST match
# config('shopify.oauth_scopes') / SHOPIFY_OAUTH_SCOPES — every scope maps to a
# real call in this codebase (App Store reviewers check unused scopes).
#
# client_id = the Shopify API key. It is NOT a secret, but it is environment-
# specific, so we keep a clearly-marked placeholder here and paste the real value
# from the Partner dashboard (the ONE manual step — see docs/SHOPIFY-APP-SETUP.md):
#   Dashboard: https://dev.shopify.com/dashboard/128972608/apps/382947852289/settings
#   Org 128972608 · App id 382947852289
# The matching API SECRET lives only in env (SHOPIFY_API_SECRET), never here.

name = "LETS"
handle = "lets"
client_id = "REPLACE_WITH_SHOPIFY_API_KEY"  # paste API key from dashboard app 382947852289
application_url = "https://app.lets.co.il"
embedded = true

[access_scopes]
# Keep in sync with SHOPIFY_OAUTH_SCOPES in .env / config/shopify.php.
scopes = "read_products,read_orders,write_orders,read_draft_orders,write_draft_orders,read_customers,read_fulfillments,write_fulfillments,read_merchant_managed_fulfillment_orders,write_merchant_managed_fulfillment_orders"

[auth]
redirect_urls = [
  "https://app.lets.co.il/shopify/callback",
]

[webhooks]
# Pinned to the platform Admin API version (config/shopify.php api_version +
# SHOPIFY_API_VERSION). Bump in lockstep each quarter.
api_version = "2026-04"

# Mandatory privacy / GDPR webhooks — App Store rejection if missing.
[[webhooks.subscriptions]]
topics = ["customers/data_request"]
uri = "/shopify/webhooks"

[[webhooks.subscriptions]]
topics = ["customers/redact"]
uri = "/shopify/webhooks"

[[webhooks.subscriptions]]
topics = ["shop/redact"]
uri = "/shopify/webhooks"

# Operational webhooks (also registered per-shop via the Admin API on install).
[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "/shopify/webhooks"

[[webhooks.subscriptions]]
topics = ["orders/paid", "orders/create", "orders/cancelled", "orders/fulfilled", "refunds/create"]
uri = "/shopify/webhooks"

# Catalog sync — keep the local products cache fresh (W1).
[[webhooks.subscriptions]]
topics = ["products/create", "products/update", "products/delete"]
uri = "/shopify/webhooks"

[app_proxy]
# Storefront → backend trust boundary for the installment button + the thank-you /
# post-purchase upsell widgets. The extensions (extensions/lets-thank-you and
# extensions/lets-post-purchase) call the app through this proxy so the request is
# Shopify-signed (App Proxy `signature`) — the storefront/extension never sends a
# trusted shop id. Verified by App\Http\Middleware\VerifyShopifyAppProxy.
#   Storefront URL:  https://{shop}/apps/payplus/...  →  https://app.lets.co.il/proxy/...
url = "https://app.lets.co.il/proxy"
subpath = "payplus"
prefix = "apps"

[pos]
embedded = false

# === Extensions ===
# The two upsell extensions live under extensions/ and are AUTO-DISCOVERED by the
# unified app config — each has its own extensions/<name>/shopify.extension.toml,
# so NO [[extensions]] block is needed here. `shopify app deploy` bundles them.
#   - extensions/lets-thank-you     → ui_extension (thank-you + order-status block).
#                                      PRIMARY path for PayPlus (token widget).
#   - extensions/lets-post-purchase → checkout_post_purchase (interstitial).
#                                      SECONDARY/enhancement; native applyChangeset
#                                      needs Shopify Payments (gated, Phase 0.5).
