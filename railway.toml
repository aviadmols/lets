# Railway deploy config. The web service builds the Dockerfile; worker and
# scheduler services reuse the same image and override the start command
# (see Procfile). Migrations + key checks run pre-deploy.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Runs once before the new version takes traffic. Keep idempotent.
preDeployCommand = "sh scripts/predeploy.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# NO HTTP healthcheck here on purpose. This file is shared by all three services
# (web, worker, scheduler). Only `web` serves HTTP — `worker` (horizon) and
# `scheduler` (schedule:work) have no listening port, so a global
# `healthcheckPath = "/up"` made EVERY worker/scheduler deploy fail
# ("1/1 replicas never became healthy"). FrankPHP cold-boot also produced
# false negatives for web. Verify web liveness with a manual GET /up after
# deploy. To re-gate web only, give it a per-service config file
# (railway.web.toml) with healthcheckPath set, via its Railway config path.
